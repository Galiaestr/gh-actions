name: Expression
run-name: ${{ github.actor }} probando expresiones en GitHub Actions
on:
  workflow_dispatch:
    inputs:
        edad:
            description: 'Edad'
            required: false
            type: integer
            
        nombre:
            description: 'Nombre'
            required: true
            type: string

jobs:
  mayor:
    if: ${{ inputs.edad >= 18 }}
    runs-on: ubuntu-latest
    steps:
      - name: run script
        run: echo ${{ inputs.nombre }} Eres mayor de edad
  menor:
    if: ${{ inputs.edad < 18 }}
    runs-on: ubuntu-latest
    steps:
      - name: run script
        run: echo ${{ inputs.nombre }} Eres menor de edad

  ejecuta-python-condicionales:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Edad=${{ inputs.edad }}" >> $GITHUB_ENV
      - run: echo "Nombre=${{ inputs.nombre }}" >> $GITHUB_ENV
      - uses: actions/checkout@v6
      - run: python condicionales.py