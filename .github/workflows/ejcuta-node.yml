name: Prueba ejecucion de Script
run-name: Script de Python de Ununtu
on: [push]
jobs:
  ejecuta-script-python:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Inicia Actions"
      - run: python --version 
      - name: Check out repository code
        uses: actions/checkout@v6
      - run: ls -al
      - run: python app.py

  ejecuta-script-deno:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Inicia Actions"
      - name: Config Deno
        uses: denoland/setup-deno@v2
      - run: deno --version
      - name: Check out repository code
        uses: actions/checkout@v6
      - run: ls -al
      - run: deno app.js
